<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Call Assistant · OVB</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2244;--navy2:#122a52;--navy3:#1a3460;
  --pink:#e04578;--pink2:#ea6e96;
  --teal:#5bbfc2;--teal2:#3da5a8;
  --purple:#8b6bae;--white:#ffffff;
  --muted:#7a97c4;--border:rgba(255,255,255,0.1);
  --r:14px;--rs:8px;
}
html,body{
  height:100%;background-color:var(--navy);
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:24px 24px;
  color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

/* ── SCREENS ── */
.screen{display:none;height:100dvh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ── HEADER ── */
.hdr{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;flex-shrink:0;
  background:rgba(13,34,68,.95);border-bottom:1px solid var(--border);
}
.hdr-info{flex:1;min-width:0}
.hdr-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-back{
  background:rgba(255,255,255,.08);border:1px solid var(--border);
  color:var(--white);border-radius:var(--rs);
  padding:6px 11px;font-size:13px;cursor:pointer;flex-shrink:0;
}
.btn-back:active{opacity:.7}

/* ════════ HOME ════════ */
#home .body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 18px;gap:14px}
.logo-name{
  font-size:26px;font-weight:900;letter-spacing:-.5px;text-align:center;margin-bottom:12px;
  background:linear-gradient(135deg,var(--teal),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.mode-card{
  border-radius:var(--r);padding:18px 16px;cursor:pointer;
  border:2px solid transparent;background:var(--navy2);
}
.mode-card.atom{border-color:var(--teal2)}
.mode-card.halado{border-color:var(--purple)}
.mode-card:active{filter:brightness(1.2)}
.mc-icon{font-size:28px;margin-bottom:6px}
.mc-title{font-size:18px;font-weight:800;margin-bottom:3px}
.mc-title.t{color:var(--teal)}.mc-title.p{color:var(--pink)}
.mc-desc{font-size:13px;color:var(--muted);line-height:1.4}

/* ════════ CALL TYPE ════════ */
#calltype .body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.slabel{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.type-card{
  background:var(--navy2);border:1px solid var(--border);
  border-radius:var(--r);padding:13px 14px;
  cursor:pointer;display:flex;align-items:center;gap:12px;
}
.type-card:active{border-color:var(--pink)}
.tc-icon{font-size:22px;flex-shrink:0}
.tc-name{font-size:14px;font-weight:600;margin-bottom:1px}
.tc-sub{font-size:11px;color:var(--muted)}
.tc-arr{color:var(--muted);font-size:18px;margin-left:auto;flex-shrink:0}

/* ════════ ACTIVE CALL ════════ */

/* Flow breadcrumb strip */
.flow-strip{
  display:flex;align-items:center;gap:4px;
  padding:7px 14px;overflow-x:auto;flex-shrink:0;
  background:rgba(13,34,68,.9);border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.flow-strip::-webkit-scrollbar{display:none}
.flow-step{display:flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.fs-dot{
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,.15);flex-shrink:0;transition:all .2s;
}
.fs-dot.done{background:var(--teal2)}
.fs-dot.active{background:var(--pink);box-shadow:0 0 7px rgba(224,69,120,.8)}
.fs-name{font-size:11px;color:rgba(255,255,255,.3)}
.fs-name.done{color:var(--teal2)}
.fs-name.active{color:var(--white);font-weight:700}
.fs-arr{font-size:12px;color:rgba(255,255,255,.2);margin:0 1px;flex-shrink:0}

/* THREAD — scrollable conversation log */
.thread{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}

/* Past YOU cards (faded) */
.th-you{
  background:var(--navy2);
  border-left:3px solid rgba(224,69,120,.3);
  border-radius:0 var(--rs) var(--rs) 0;
  padding:10px 12px;
  opacity:.55;transition:opacity .2s;
}
/* Active YOU card */
.th-you.th-current{
  opacity:1;
  border-left:none;
  border:1.5px solid rgba(224,69,120,.6);
  border-radius:var(--r);
  box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0 1px rgba(224,69,120,.08);
}
.th-you.th-success{border-color:rgba(91,191,194,.6)}
.th-you.th-branch{border-color:rgba(91,191,194,.5)}

.th-you-lbl{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--pink);margin-bottom:8px;
}
.th-you.th-success .th-you-lbl{color:var(--teal)}
.th-you.th-branch .th-you-lbl{color:var(--teal)}
.th-you-text{font-size:14px;line-height:1.7;white-space:pre-wrap}
.th-you-text .hl{color:var(--pink2);font-weight:600}
.th-you-text .hl-t{color:var(--teal);font-weight:600}
.th-you-text .var{
  background:rgba(224,69,120,.15);color:var(--pink2);
  border-radius:4px;padding:1px 5px;font-style:italic;
}
/* Past YOU text is smaller */
.th-you:not(.th-current) .th-you-text{font-size:13px;line-height:1.6}

/* Client response bubble */
.th-client{
  margin-left:20px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(91,191,194,.25);
  border-radius:var(--rs);padding:9px 12px;
}
.th-client-lbl{
  font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--teal2);margin-bottom:4px;
}
.th-client-text{font-size:13px;color:var(--muted);font-style:italic}

/* Tip box */
.th-tip{
  margin-top:10px;padding:9px 11px;
  background:rgba(224,154,42,.08);border:1px solid rgba(224,154,42,.25);
  border-radius:var(--rs);font-size:12px;color:#e0c070;line-height:1.6;
}
/* Success badge */
.success-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--teal2);color:white;border-radius:20px;
  padding:3px 10px;font-size:11px;font-weight:700;margin-bottom:10px;
}

/* Reactions section (below current card) */
.react-lbl{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:9px;
}
.react-lbl.branch-lbl{color:var(--teal)}
.react-list{display:flex;flex-direction:column;gap:7px}
.react-btn{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 12px;text-align:left;color:var(--white);
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:9px;line-height:1.4;
  transition:border-color .1s,background .1s;
}
.react-btn:hover{border-color:var(--pink2);background:rgba(224,69,120,.08)}
.react-btn:active{border-color:var(--pink);background:rgba(224,69,120,.15)}
.react-btn.branch-btn{border-color:rgba(91,191,194,.35)}
.react-btn.branch-btn:hover{border-color:var(--teal);background:rgba(91,191,194,.1)}
.rb-icon{font-size:17px;flex-shrink:0}
.rb-text{flex:1;font-style:italic;color:var(--muted)}
.react-btn.branch-btn .rb-text{color:var(--teal2);font-style:normal;font-weight:500}
.rb-arr{color:rgba(255,255,255,.2);flex-shrink:0;font-size:15px}
.restart-btn{
  width:100%;margin-top:12px;padding:11px;
  background:rgba(91,191,194,.12);border:1px solid var(--teal2);
  color:var(--teal);border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;
}
.restart-btn:active{opacity:.7}

/* ════════ OBJECTION BAR ════════ */
.obj-bar{
  display:flex;align-items:center;gap:7px;
  padding:9px 14px;flex-shrink:0;
  background:rgba(9,22,52,.98);
  border-top:1px solid rgba(224,69,120,.3);
  overflow-x:auto;scrollbar-width:none;
}
.obj-bar::-webkit-scrollbar{display:none}
.obj-bar-lbl{font-size:11px;font-weight:700;color:var(--pink);flex-shrink:0;white-space:nowrap}
.obj-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:20px;
  border:1px solid rgba(224,69,120,.3);
  background:rgba(224,69,120,.07);cursor:pointer;
  white-space:nowrap;flex-shrink:0;font-size:12px;color:var(--muted);
  transition:border-color .1s,background .1s,color .1s;
}
.obj-chip:hover{border-color:var(--pink);background:rgba(224,69,120,.18);color:white}
.obj-chip:active{background:rgba(224,69,120,.3)}

/* ════════ MODAL ════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(4,10,30,.88);
  backdrop-filter:blur(5px);z-index:200;
  display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--navy2);border:1px solid var(--border);
  border-radius:16px;width:100%;max-width:480px;max-height:86dvh;
  display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.7);overflow:hidden;
}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px 11px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-hdr h2{font-size:14px;font-weight:700}
.modal-close{
  background:rgba(255,255,255,.08);border:none;color:var(--muted);
  border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:active{background:rgba(255,255,255,.18)}
.modal-body{flex:1;overflow-y:auto;padding:14px 16px 20px}
.obj-list{display:flex;flex-direction:column;gap:6px}
.obj-row{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:var(--rs);padding:11px 12px;
  cursor:pointer;display:flex;align-items:center;gap:10px;
  color:var(--white);width:100%;text-align:left;font-size:13px;
}
.obj-row:active{background:rgba(224,69,120,.1)}
.obj-row .ri{font-size:19px;flex-shrink:0}
.obj-row .rl{flex:1;font-weight:600}
.obj-row .ra{color:var(--muted)}
.back-btn{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--muted);border-radius:var(--rs);
  padding:8px 11px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:5px;margin-bottom:12px;width:100%;
}
.script-block{
  background:rgba(255,255,255,.05);border-left:3px solid var(--pink);
  border-radius:0 var(--rs) var(--rs) 0;
  padding:10px 12px;margin-bottom:8px;
  font-size:13px;line-height:1.7;color:var(--white);
}
.trig{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:var(--rs);padding:9px 11px;font-size:12px;
  color:var(--muted);font-style:italic;margin-bottom:7px;line-height:1.5;
}
.otag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin:10px 0 5px;display:block}
.otag:first-child{margin-top:0}
.otag.pink{color:var(--pink)}.otag.muted{color:var(--muted)}
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div class="screen active" id="home">
  <div class="hdr" style="justify-content:center;border-bottom:2px solid var(--pink)">
    <div style="text-align:center">
      <div class="logo-name">📞 Call Assistant</div>
      <div style="font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:2px">OVB · Hívás segédlet</div>
    </div>
  </div>
  <div class="body">
    <div style="text-align:center;color:var(--muted);font-size:12px;padding-bottom:4px">Válassz módot a hívás előtt</div>
    <div class="mode-card atom" onclick="selectMode('atom')">
      <div class="mc-icon">🌱</div>
      <div class="mc-title t">ATOM KEZDŐ</div>
      <div class="mc-desc">Ismerősi körből egyeztetsz · Első hívások</div>
    </div>
    <div class="mode-card halado" onclick="selectMode('halado')">
      <div class="mc-icon">🎯</div>
      <div class="mc-title p">HALADÓ</div>
      <div class="mc-desc">Ajánlásból dolgozol · Szerviz · Tanácsadás</div>
    </div>
  </div>
</div>

<!-- ══ CALL TYPE ══ -->
<div class="screen" id="calltype">
  <div class="hdr">
    <button class="btn-back" onclick="goHome()">← Vissza</button>
    <div class="hdr-info">
      <div class="hdr-title" id="ct-title"></div>
    </div>
  </div>
  <div class="body" id="ct-list"></div>
</div>

<!-- ══ ACTIVE CALL ══ -->
<div class="screen" id="activecall">
  <div class="hdr">
    <button class="btn-back" onclick="goBack()">← Vissza</button>
    <div class="hdr-info">
      <div class="hdr-title" id="ac-title"></div>
    </div>
  </div>
  <div class="flow-strip" id="flow-strip"></div>
  <div class="thread" id="thread"></div>
  <div class="obj-bar" id="obj-bar"></div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal" id="modal-box">
    <div class="modal-hdr">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentMode=null, currentTypeId=null, currentStory=null, currentNodeId=null, nodeHistory=[];
let conversationHistory=[]; // [{type:'you',label,text,tip?} | {type:'client',icon,text}]

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function goHome(){showScreen('home')}
function selectMode(mode){currentMode=mode;showScreen('calltype');renderCallTypes()}
function goBack(){
  if(nodeHistory.length>1){
    nodeHistory.pop();
    currentNodeId=nodeHistory[nodeHistory.length-1];
    renderNode();
  } else {
    showScreen('calltype');
  }
}
function selectCallType(id){
  currentTypeId=id;
  currentStory=STORIES[id];
  currentNodeId=currentStory.start;
  nodeHistory=[currentNodeId];
  conversationHistory=[];
  document.getElementById('ac-title').textContent=currentStory.title;
  renderObjBar();
  renderNode();
  showScreen('activecall');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function navigateTo(nodeId){
  if(nodeId.startsWith('__OBJ_')){openObjDirect(nodeId);return}
  // Save current node to history
  const cur=currentStory.nodes[currentNodeId];
  if(cur){
    conversationHistory.push({type:'you',label:cur.label,text:cur.you,tip:cur.tip||null});
    const chosen=cur.reactions.find(r=>r.next===nodeId);
    if(chosen) conversationHistory.push({type:'client',icon:chosen.icon||'💬',text:chosen.text});
  }
  currentNodeId=nodeId;
  nodeHistory.push(nodeId);
  renderNode();
}
function restartFlow(){
  currentNodeId=currentStory.start;
  nodeHistory=[currentNodeId];
  conversationHistory=[];
  renderNode();
}

// ═══════════════════════════════════════
// RENDER CALL TYPES
// ═══════════════════════════════════════
function renderCallTypes(){
  const types=CALL_TYPES[currentMode];
  document.getElementById('ct-title').textContent=currentMode==='atom'?'🌱 ATOM KEZDŐ':'🎯 HALADÓ';
  const list=document.getElementById('ct-list');
  list.innerHTML='<div class="slabel">Válassz call típust</div>';
  types.forEach(t=>{
    list.innerHTML+=`<div class="type-card" onclick="selectCallType('${t.id}')">
      <div class="tc-icon">${t.icon}</div>
      <div><div class="tc-name">${t.name}</div><div class="tc-sub">${t.sub}</div></div>
      <div class="tc-arr">›</div>
    </div>`;
  });
}

// ═══════════════════════════════════════
// RENDER NODE (thread-based)
// ═══════════════════════════════════════
function renderNode(){
  const node=currentStory.nodes[currentNodeId];
  if(!node)return;
  const isSuccess=node.type==='success';
  const isBranch=node.type==='branch';

  renderFlowStrip(node);

  const thread=document.getElementById('thread');
  let html='';

  // ── Past conversation history ──
  conversationHistory.forEach(item=>{
    if(item.type==='you'){
      html+=`<div class="th-you">
        <div class="th-you-lbl">🗣️ TE · ${item.label}</div>
        <div class="th-you-text">${item.text}</div>
        ${item.tip?`<div class="th-tip">${item.tip.replace(/\n/g,'<br>')}</div>`:''}
      </div>`;
    } else {
      html+=`<div class="th-client">
        <div class="th-client-lbl">💬 Ügyfél válasza</div>
        <div class="th-client-text">${item.icon} ${item.text}</div>
      </div>`;
    }
  });

  // ── Current active card ──
  let curLbl='🗣️ TE MONDOD';
  let curCls='th-current';
  if(isSuccess){curLbl='✅ IDŐPONT MEGKÖTVE';curCls='th-current th-success'}
  if(isBranch){curLbl='🔀 VÁLASSZ IRÁNYT';curCls='th-current th-branch'}

  html+=`<div class="th-you ${curCls}">
    <div class="th-you-lbl">${curLbl}</div>
    ${isSuccess?'<div style="margin-bottom:9px"><span class="success-badge">🎉 Sikeres egyeztetés!</span></div>':''}
    <div class="th-you-text">${node.you}</div>
    ${node.tip?`<div class="th-tip">${node.tip.replace(/\n/g,'<br>')}</div>`:''}
  </div>`;

  // ── Reactions / branch choices ──
  if(node.reactions&&node.reactions.length>0){
    const lbl=isBranch
      ?'<div class="react-lbl branch-lbl">🔀 Melyik irány?</div>'
      :'<div class="react-lbl">💬 Az ügyfél reagál...</div>';
    let btns='<div class="react-list">';
    node.reactions.forEach(r=>{
      const bb=r.class==='branch';
      btns+=`<button class="react-btn${bb?' branch-btn':''}" onclick="navigateTo('${r.next}')">
        <span class="rb-icon">${r.icon||'💬'}</span>
        <span class="rb-text">${r.text}</span>
        <span class="rb-arr">›</span>
      </button>`;
    });
    btns+='</div>';
    html+=lbl+btns;
  }
  if(isSuccess){
    html+=`<button class="restart-btn" onclick="restartFlow()">🔄 Új hívás indítása</button>`;
  }

  html+='<div style="height:16px"></div>';
  thread.innerHTML=html;
  requestAnimationFrame(()=>{ thread.scrollTop=thread.scrollHeight; });
}

// ═══════════════════════════════════════
// FLOW STRIP
// ═══════════════════════════════════════
function renderFlowStrip(currentNode){
  const strip=document.getElementById('flow-strip');
  const nodes=currentStory.nodes;
  let html='';
  nodeHistory.forEach((nid,i)=>{
    const n=nodes[nid];if(!n)return;
    const isLast=i===nodeHistory.length-1;
    const cls=isLast?'active':'done';
    if(i>0)html+=`<div class="fs-arr">›</div>`;
    html+=`<div class="flow-step"><div class="fs-dot ${cls}"></div><div class="fs-name ${cls}">${n.label}</div></div>`;
  });
  // Future placeholders
  const curStep=currentNode.step||0;
  const total=currentStory.totalSteps;
  if(curStep<total){
    const remaining=total-curStep;
    for(let i=0;i<remaining;i++){
      html+=`<div class="fs-arr">›</div><div class="flow-step"><div class="fs-dot"></div><div class="fs-name">·</div></div>`;
    }
  }
  strip.innerHTML=html;
  strip.scrollLeft=strip.scrollWidth;
}

// ═══════════════════════════════════════
// OBJECTION BAR
// ═══════════════════════════════════════
function renderObjBar(){
  const bar=document.getElementById('obj-bar');
  let html='<span class="obj-bar-lbl">⚡</span>';
  OBJECTIONS.forEach((o,i)=>{
    html+=`<button class="obj-chip" onclick="showObjDetail(${i})">${o.icon} ${o.label}</button>`;
  });
  bar.innerHTML=html;
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function closeModal(){document.getElementById('modal').classList.remove('open')}
function closeModalOut(e){if(e.target===document.getElementById('modal'))closeModal()}
function openObjDirect(objId){
  const idx=OBJECTIONS.findIndex(o=>o.id===objId);
  if(idx>=0)showObjDetail(idx);
}
function showObjDetail(idx){
  const obj=OBJECTIONS[idx];
  document.getElementById('modal-title').textContent=`${obj.icon} ${obj.label}`;
  let html='';
  obj.items.forEach((item,i)=>{
    html+=`<div style="margin-top:${i>0?'16px':'0'}">
      <span class="otag muted">Ügyfél mondja:</span>
      <div class="trig">${item.trigger}</div>
      <span class="otag pink">Te válaszolod:</span>
      <div class="script-block">${item.resp}</div>
    </div>`;
  });
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-box').scrollTop=0;
}
</script>
