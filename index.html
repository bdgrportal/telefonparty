<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Call Assistant · OVB</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2244;
  --navy2:#122a52;
  --navy3:#1a3460;
  --pink:#e04578;
  --pink2:#ea6e96;
  --teal:#5bbfc2;
  --teal2:#3da5a8;
  --purple:#8b6bae;
  --white:#ffffff;
  --muted:#7a97c4;
  --border:rgba(255,255,255,0.1);
  --r:14px;--rs:8px;
}
html,body{
  height:100%;min-height:100dvh;
  background-color:var(--navy);
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:24px 24px;
  color:var(--white);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

/* SCREENS */
.screen{display:none;height:100dvh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* HEADER */
.hdr{
  display:flex;align-items:center;gap:10px;
  padding:13px 16px;flex-shrink:0;
  background:rgba(13,34,68,0.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}
.hdr-info{flex:1;min-width:0}
.hdr-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.btn-back{
  background:rgba(255,255,255,0.08);border:1px solid var(--border);
  color:var(--white);border-radius:var(--rs);
  padding:7px 11px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.btn-back:active{opacity:.7}

/* ════════════ HOME ════════════ */
#home .body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 20px;gap:16px}
.logo{text-align:center;margin-bottom:8px}
.logo-name{
  font-size:28px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--teal),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-tag{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.mode-card{
  border-radius:var(--r);padding:20px 18px;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s,transform .1s;
  background:var(--navy2);position:relative;overflow:hidden;
}
.mode-card::after{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:20px 20px;pointer-events:none;
}
.mode-card:active{transform:scale(.98)}
.mode-card.atom{border-color:var(--teal2)}
.mode-card.halado{border-color:var(--purple)}
.mc-icon{font-size:32px;margin-bottom:8px}
.mc-title{font-size:19px;font-weight:800;margin-bottom:4px}
.mc-title.t{color:var(--teal)}
.mc-title.p{color:var(--pink)}
.mc-desc{font-size:13px;color:var(--muted);line-height:1.5}

/* ════════════ CALL TYPE ════════════ */
#calltype .body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px}
.slabel{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.type-card{
  background:var(--navy2);border:1px solid var(--border);
  border-radius:var(--r);padding:15px;
  cursor:pointer;display:flex;align-items:center;gap:13px;
  transition:border-color .1s;
}
.type-card:active{border-color:var(--pink)}
.tc-icon{font-size:24px;flex-shrink:0}
.tc-name{font-size:15px;font-weight:600;margin-bottom:2px}
.tc-sub{font-size:12px;color:var(--muted)}
.tc-arr{color:var(--muted);font-size:20px;margin-left:auto;flex-shrink:0}

/* ════════════ ACTIVE CALL – STORY ════════════ */
#activecall{position:relative}
#activecall .body{flex:1;overflow-y:auto;display:flex;flex-direction:column;padding:16px 16px 100px}

/* PROGRESS */
.progress-bar{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px 8px;flex-shrink:0;
  background:rgba(13,34,68,0.7);border-bottom:1px solid var(--border);
}
.prog-dots{display:flex;gap:5px;align-items:center;flex:1}
.prog-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .2s;flex-shrink:0}
.prog-dot.done{background:var(--teal2)}
.prog-dot.active{background:var(--pink);width:22px;border-radius:4px;box-shadow:0 0 6px rgba(224,69,120,.5)}
.prog-label{font-size:11px;color:var(--muted);white-space:nowrap}

/* YOU SAY CARD */
.you-card{
  background:var(--navy2);
  border:1.5px solid var(--pink);
  border-radius:var(--r);padding:18px 16px;
  box-shadow:0 0 24px rgba(224,69,120,.12);
  margin-bottom:18px;flex-shrink:0;
}
.you-label{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--pink);margin-bottom:11px;
}
.you-label::before{content:'🗣️';font-size:14px}
.you-text{
  font-size:15px;line-height:1.75;color:var(--white);
  white-space:pre-wrap;
}
.you-text .hl{color:var(--pink2);font-weight:600}
.you-text .hl-t{color:var(--teal);font-weight:600}
.you-text .var{
  background:rgba(224,69,120,.15);color:var(--pink2);
  border-radius:4px;padding:1px 5px;font-style:italic;
}
.tip-box{
  margin-top:12px;padding:10px 12px;
  background:rgba(224,154,42,.08);border:1px solid rgba(224,154,42,.25);
  border-radius:var(--rs);font-size:12px;color:#e0c070;line-height:1.6;
  white-space:pre-wrap;
}

/* SUCCESS STATE */
.you-card.success{
  border-color:var(--teal);
  box-shadow:0 0 24px rgba(91,191,194,.15);
}
.you-card.success .you-label{color:var(--teal)}
.success-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--teal2);color:white;
  border-radius:20px;padding:4px 12px;
  font-size:12px;font-weight:700;margin-bottom:12px;
}
.btn-restart{
  width:100%;margin-top:14px;padding:13px;
  background:rgba(91,191,194,.15);border:1px solid var(--teal2);
  color:var(--teal);border-radius:var(--rs);
  font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-restart:active{opacity:.75}

/* REACTIONS */
.reactions-section{flex-shrink:0}
.reactions-label{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.reactions-label::before{content:'💬';font-size:13px}
.reactions-list{display:flex;flex-direction:column;gap:8px}
.react-btn{
  width:100%;background:var(--navy2);
  border:1px solid var(--border);border-radius:var(--rs);
  padding:13px 14px;text-align:left;
  color:var(--white);font-size:14px;font-weight:500;line-height:1.4;
  cursor:pointer;transition:border-color .1s,background .1s;
  display:flex;align-items:center;gap:10px;
}
.react-btn:active{border-color:var(--pink);background:var(--navy3)}
.react-btn .rb-quote{
  flex:1;font-size:13px;color:var(--muted);font-style:italic;
}
.react-btn .rb-icon{font-size:18px;flex-shrink:0}
.react-btn .rb-arr{color:var(--muted);font-size:16px;flex-shrink:0;margin-left:auto}
.react-btn.branch{border-color:var(--teal2);color:var(--teal)}
.react-btn.branch .rb-quote{color:var(--teal2)}

/* BRANCH NODE (advisor chooses direction) */
.branch-label{
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--teal);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.branch-label::before{content:'🔀';font-size:13px}

/* FAB */
.obj-fab{
  position:fixed;bottom:20px;right:16px;
  background:var(--pink);color:white;border:none;
  border-radius:50px;padding:13px 18px;
  font-size:14px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(224,69,120,.55);
  z-index:50;display:none;align-items:center;gap:7px;
}
.obj-fab:active{transform:scale(.95)}

/* ════════════ MODAL ════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(5,12,35,.85);
  backdrop-filter:blur(4px);z-index:200;
  display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--navy2);border:1px solid var(--border);
  border-radius:16px;width:100%;max-width:520px;max-height:84dvh;
  display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px rgba(224,69,120,.15);
  overflow:hidden;position:relative;
}
.modal::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:20px 20px;pointer-events:none;z-index:0;
}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 18px 13px;border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:1;
}
.modal-hdr h2{font-size:15px;font-weight:700}
.modal-close{
  background:rgba(255,255,255,.08);border:none;color:var(--muted);
  border-radius:50%;width:28px;height:28px;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-close:active{background:rgba(255,255,255,.15)}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px 22px;position:relative;z-index:1}

/* OBJ LIST */
.obj-list{display:flex;flex-direction:column;gap:7px}
.obj-row{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:var(--rs);padding:12px 13px;
  cursor:pointer;display:flex;align-items:center;gap:11px;
  color:var(--white);width:100%;text-align:left;font-size:14px;
  transition:background .1s;
}
.obj-row:active{background:rgba(224,69,120,.1)}
.obj-row .ri{font-size:20px;flex-shrink:0}
.obj-row .rl{flex:1;font-weight:600}
.obj-row .ra{color:var(--muted)}
.back-btn{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--muted);border-radius:var(--rs);
  padding:9px 12px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:6px;margin-bottom:14px;width:100%;
}
.script-block{
  background:rgba(255,255,255,.05);border-left:3px solid var(--pink);
  border-radius:0 var(--rs) var(--rs) 0;
  padding:12px 13px;margin-bottom:9px;
  font-size:14px;line-height:1.7;color:var(--white);
}
.script-block.t{border-left-color:var(--teal)}
.script-block.tip{border-left-color:#e09a2a;background:rgba(224,154,42,.07);font-size:13px;color:#e0c070}
.otag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  margin:12px 0 6px;display:block}
.otag:first-child{margin-top:0}
.otag.pink{color:var(--pink)}
.otag.teal{color:var(--teal)}
.otag.muted{color:var(--muted)}
.trig{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:var(--rs);padding:10px 12px;font-size:13px;
  color:var(--muted);font-style:italic;margin-bottom:8px;line-height:1.5;
}
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div class="screen active" id="home">
  <div class="hdr" style="justify-content:center;border-bottom:2px solid var(--pink)">
    <div style="text-align:center">
      <div class="logo-name">📞 Call Assistant</div>
      <div style="font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:3px">OVB · Hívás segédlet</div>
    </div>
  </div>
  <div class="body">
    <div style="text-align:center;color:var(--muted);font-size:13px;padding:0 0 4px">Válassz módot a hívás előtt</div>
    <div class="mode-card atom" onclick="selectMode('atom')">
      <div class="mc-icon">🌱</div>
      <div class="mc-title t">ATOM KEZDŐ</div>
      <div class="mc-desc">Ismerősi körből egyeztetsz · Első hívások · Gyakorló script</div>
    </div>
    <div class="mode-card halado" onclick="selectMode('halado')">
      <div class="mc-icon">🎯</div>
      <div class="mc-title p">HALADÓ</div>
      <div class="mc-desc">Ajánlásból dolgozol · Szerviz · Tanácsadás · Ajánláskérés</div>
    </div>
  </div>
</div>

<!-- ══════════ CALL TYPE ══════════ -->
<div class="screen" id="calltype">
  <div class="hdr">
    <button class="btn-back" onclick="goHome()">← Vissza</button>
    <div class="hdr-info">
      <div class="hdr-title" id="ct-title"></div>
      <div class="hdr-sub" id="ct-sub"></div>
    </div>
  </div>
  <div class="body" id="ct-list"></div>
</div>

<!-- ══════════ ACTIVE CALL ══════════ -->
<div class="screen" id="activecall">
  <div class="hdr">
    <button class="btn-back" onclick="goBack()">← Vissza</button>
    <div class="hdr-info">
      <div class="hdr-title" id="ac-title"></div>
      <div class="hdr-sub" id="ac-sub">Kövesed a szálat – kattints a reakcióra</div>
    </div>
  </div>
  <div class="progress-bar" id="progress-bar">
    <div class="prog-dots" id="prog-dots"></div>
    <div class="prog-label" id="prog-label"></div>
  </div>
  <div class="body" id="ac-body"></div>
  <button class="obj-fab" id="obj-fab" onclick="openObjMenu()">⚡ Kifogás</button>
</div>

<!-- ══════════ MODAL ══════════ -->
<div class="modal-overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal" id="modal-box">
    <div class="modal-hdr">
      <h2 id="modal-title">Script</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// STORY DATA  (node-based decision tree)
// ══════════════════════════════════════════════

// reactions with next:'__OBJ_X' open the objection modal

// type:'success' = end of call, success state

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentMode = null;
let currentTypeId = null;
let currentStory = null;
let currentNodeId = null;
let nodeHistory = [];

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function goHome() {
  showScreen('home');
  document.getElementById('obj-fab').style.display = 'none';
}

function selectMode(mode) {
  currentMode = mode;
  showScreen('calltype');
  renderCallTypes();
}

function goBack() {
  if (nodeHistory.length > 1) {
    nodeHistory.pop();
    currentNodeId = nodeHistory[nodeHistory.length - 1];
    renderNode();
  } else {
    showScreen('calltype');
    document.getElementById('obj-fab').style.display = 'none';
  }
}

function selectCallType(id) {
  currentTypeId = id;
  currentStory = STORIES[id];
  currentNodeId = currentStory.start;
  nodeHistory = [currentNodeId];
  showScreen('activecall');
  document.getElementById('ac-title').textContent = currentStory.title;
  document.getElementById('obj-fab').style.display = 'flex';
  renderNode();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function navigateTo(nodeId) {
  if (nodeId.startsWith('__OBJ_')) {
    openObjDirect(nodeId);
    return;
  }
  currentNodeId = nodeId;
  nodeHistory.push(nodeId);
  renderNode();
  document.getElementById('ac-body').scrollTop = 0;
}

// ══════════════════════════════════════════════
// RENDER CALL TYPES
// ══════════════════════════════════════════════
function renderCallTypes() {
  const types = CALL_TYPES[currentMode];
  document.getElementById('ct-title').textContent = currentMode === 'atom' ? '🌱 ATOM KEZDŐ' : '🎯 HALADÓ';
  document.getElementById('ct-sub').textContent = currentMode === 'atom' ? 'Ismerősi körből egyeztetsz' : 'Ajánlásból dolgozol';
  const list = document.getElementById('ct-list');
  list.innerHTML = `<div class="slabel">Válassz call típust</div>`;
  types.forEach(t => {
    list.innerHTML += `<div class="type-card" onclick="selectCallType('${t.id}')">
      <div class="tc-icon">${t.icon}</div>
      <div><div class="tc-name">${t.name}</div><div class="tc-sub">${t.sub}</div></div>
      <div class="tc-arr">›</div>
    </div>`;
  });
}

// ══════════════════════════════════════════════
// RENDER NODE (the story step)
// ══════════════════════════════════════════════
function renderNode() {
  const node = currentStory.nodes[currentNodeId];
  if (!node) return;

  // Progress dots
  const total = currentStory.totalSteps;
  const cur = node.step;
  const dots = document.getElementById('prog-dots');
  dots.innerHTML = '';
  for (let i = 1; i <= total; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    dots.appendChild(d);
  }
  document.getElementById('prog-label').textContent = `${node.label} · ${cur}/${total}`;

  const body = document.getElementById('ac-body');
  body.innerHTML = '';

  // YOU CARD
  const card = document.createElement('div');
  card.className = 'you-card' + (node.type === 'success' ? ' success' : '');

  let cardHtml = '';
  if (node.type === 'success') {
    cardHtml += `<div class="success-badge">✅ Időpont megkötve!</div>`;
  }
  if (node.type === 'branch') {
    cardHtml += `<div class="branch-label">Te döntöd el – válassz irányt</div>`;
  } else {
    cardHtml += `<div class="you-label">Te mondod</div>`;
  }
  cardHtml += `<div class="you-text">${node.you}</div>`;
  if (node.tip) {
    cardHtml += `<div class="tip-box">${node.tip}</div>`;
  }
  if (node.type === 'success') {
    cardHtml += `<button class="btn-restart" onclick="restartFlow()">🔄 Új hívás indítása</button>`;
  }
  card.innerHTML = cardHtml;
  body.appendChild(card);

  // REACTIONS
  if (node.reactions && node.reactions.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'reactions-section';

    if (node.type === 'branch') {
      sec.innerHTML = `<div class="branch-label" style="margin-bottom:10px">🔀 Válassz forgatókönyvet</div>`;
    } else {
      sec.innerHTML = `<div class="reactions-label">Az ügyfél reagál...</div>`;
    }

    const list = document.createElement('div');
    list.className = 'reactions-list';

    node.reactions.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'react-btn' + (r.class === 'branch' ? ' branch' : '');
      btn.innerHTML = `
        <span class="rb-icon">${r.icon || '💬'}</span>
        <span class="rb-quote">${r.text}</span>
        <span class="rb-arr">›</span>
      `;
      btn.onclick = () => navigateTo(r.next);
      list.appendChild(btn);
    });

    sec.appendChild(list);
    body.appendChild(sec);
  }

  // Bottom padding
  const pad = document.createElement('div');
  pad.style.height = '90px';
  body.appendChild(pad);
}

function restartFlow() {
  currentNodeId = currentStory.start;
  nodeHistory = [currentNodeId];
  renderNode();
  document.getElementById('ac-body').scrollTop = 0;
}

// ══════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOut(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function openObjMenu() {
  document.getElementById('modal-title').textContent = '⚡ Kifogáskezelés';
  let html = '<div class="obj-list">';
  OBJECTIONS.forEach((o,i) => {
    html += `<button class="obj-row" onclick="showObjDetail(${i})">
      <span class="ri">${o.icon}</span>
      <span class="rl">${o.label}</span>
      <span class="ra">›</span>
    </button>`;
  });
  html += '</div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-box').scrollTop = 0;
}

function openObjDirect(objId) {
  const obj = OBJ_MAP[objId];
  if (!obj) { openObjMenu(); return; }
  document.getElementById('modal-title').textContent = '⚡ Kifogáskezelés';
  document.getElementById('modal-body').innerHTML = '';
  document.getElementById('modal').classList.add('open');
  const idx = OBJECTIONS.findIndex(o => o.id === objId);
  if (idx >= 0) showObjDetail(idx);
}

function showObjDetail(idx) {
  const obj = OBJECTIONS[idx];
  document.getElementById('modal-title').textContent = `${obj.icon} ${obj.label}`;
  let html = `<button class="back-btn" onclick="openObjMenu()">← Összes kifogás</button>`;
  obj.items.forEach((item, i) => {
    html += `
      <div style="margin-top:${i>0?'18px':'0'}">
        <span class="otag muted">Ügyfél mondja:</span>
        <div class="trig">${item.trigger}</div>
        <span class="otag pink">Te válaszolod:</span>
        <div class="script-block">${item.resp}</div>
      </div>`;
  });
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-box').scrollTop = 0;
}
